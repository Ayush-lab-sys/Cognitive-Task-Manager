<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Complete Task Manager</title>
    <link rel="manifest" href="/manifest.json">
    <style>
        /* All previous CSS styles from the first part remain exactly the same */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            color: #fff;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            backdrop-filter: blur(10px);
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            color: #4ecca3;
        }

        .notification-settings {
            background: rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 20px;
            backdrop-filter: blur(10px);
        }

        .toggle-switch {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }

        .toggle-switch input[type="checkbox"] {
            width: 40px;
            height: 20px;
            appearance: none;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            position: relative;
            cursor: pointer;
        }

        .toggle-switch input[type="checkbox"]:checked {
            background: #4ecca3;
        }

        .toggle-switch input[type="checkbox"]::before {
            content: '';
            width: 16px;
            height: 16px;
            background: white;
            position: absolute;
            border-radius: 50%;
            top: 2px;
            left: 2px;
            transition: 0.3s;
        }

        .toggle-switch input[type="checkbox"]:checked::before {
            left: 22px;
        }

        .task-form {
            background: rgba(255, 255, 255, 0.1);
            padding: 30px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #4ecca3;
            font-size: 1.1em;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 12px;
            border: none;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: #fff;
            font-size: 1em;
            transition: all 0.3s ease;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            background: rgba(255, 255, 255, 0.2);
            box-shadow: 0 0 10px rgba(78, 204, 163, 0.5);
        }

        button {
            background: #4ecca3;
            color: #1a1a2e;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1.1em;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        button:hover {
            background: #45b393;
            transform: translateY(-2px);
        }

        .tasks-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .task-card {
            background: rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            position: relative;
            opacity: 0;
            transform: translateY(20px);
        }

        .task-card.show {
            opacity: 1;
            transform: translateY(0);
        }

        .task-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        .task-card h3 {
            color: #4ecca3;
            margin-bottom: 10px;
            word-break: break-word;
        }

        .countdown {
            font-size: 0.9em;
            margin-top: 10px;
            padding: 8px;
            border-radius: 8px;
            text-align: center;
        }

        .urgent {
            background: rgba(255, 107, 107, 0.2);
            border: 1px solid #ff6b6b;
            animation: pulse 2s infinite;
        }

        .warning {
            background: rgba(255, 193, 7, 0.2);
            border: 1px solid #ffc107;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        .delete-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            background: #ff6b6b;
            color: white;
            border: none;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .delete-btn:hover {
            background: #ff5252;
            transform: rotate(90deg);
        }

        @media (max-width: 768px) {
            .container {
                padding: 10px;
            }
            
            .header h1 {
                font-size: 2em;
            }
            
            .task-form {
                padding: 20px;
            }
            
            .tasks-container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <button id="installPwa" style="display: none;">Install App</button>
            <button id="enableNotifications">Enable Notifications</button>
            <h1>Complete Task Manager</h1>
            <p>Smart notifications and task tracking</p>
       
        </div>

        <div class="notification-settings">
            <h3 style="margin-bottom: 15px; color: #4ecca3;">Notification Settings</h3>
            <div class="toggle-switch">
                <input type="checkbox" id="notificationToggle">
                <label for="notificationToggle">Enable Desktop Notifications</label>
            </div>
            <div class="toggle-switch">
                <input type="checkbox" id="soundToggle">
                <label for="soundToggle">Enable Sound Alerts</label>
            </div>
            <p style="font-size: 0.9em; color: #aaa;">You'll receive notifications: 24 hours, 12 hours, 6 hours, and 1 hour before deadlines</p>
        </div>

        <form class="task-form" id="taskForm">
            <div class="form-group">
                <label for="title">Task Title</label>
                <input type="text" id="title" required placeholder="Enter task title">
            </div>
            <div class="form-group">
                <label for="description">Description</label>
                <textarea id="description" rows="3" placeholder="Enter task description"></textarea>
            </div>
            <div class="form-group">
                <label for="deadline">Deadline</label>
                <input type="datetime-local" id="deadline" required>
            </div>
            <button type="submit">Add Task</button>
        </form>

        <div class="tasks-container" id="tasksContainer"></div>
    </div>

   
    <script type="module">
        // Import Firebase SDKs
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyAjlo6e2I1zGwtIk2SEgf-PeOs2RSf-exg",
            authDomain: "mindful-72943.firebaseapp.com",
            databaseURL: "https://mindful-72943-default-rtdb.firebaseio.com",
            projectId: "mindful-72943",
            storageBucket: "mindful-72943.appspot.com",
            messagingSenderId: "618540501527",
            appId: "1:618540501527:web:affa151d309feaa3ee6a52"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Function to Save Task in Firestore
        async function saveTaskToFirebase(title, description, deadline) {
            try {
                const docRef = await addDoc(collection(db, "tasks"), {
                    title: title,
                    description: description,
                    deadline: deadline,
                    createdAt: new Date().toISOString(),
                });

                console.log("Task saved with ID:", docRef.id);
                loadTasksFromFirebase(); // Reload tasks after saving
            } catch (error) {
                console.error("Error saving task:", error);
            }
        }

        // Load Tasks from Firestore
        async function loadTasksFromFirebase() {
            try {
                const querySnapshot = await getDocs(collection(db, "tasks"));
                const tasksContainer = document.getElementById("tasksContainer");
                tasksContainer.innerHTML = "";

                querySnapshot.forEach((doc) => {
                    const task = doc.data();
                    const taskHTML = `
                        <div class="task-card">
                            <h3>${task.title}</h3>
                            <p>${task.description}</p>
                            <p class="deadline">Deadline: ${new Date(task.deadline).toLocaleString()}</p>
                        </div>
                    `;
                    tasksContainer.innerHTML += taskHTML;
                });

                console.log("Tasks loaded successfully");
            } catch (error) {
                console.error("Error loading tasks:", error);
            }
        }

        // Handle Task Submission
        document.getElementById("taskForm").addEventListener("submit", async (e) => {
            e.preventDefault();
            const title = document.getElementById("title").value;
            const description = document.getElementById("description").value;
            const deadline = document.getElementById("deadline").value;

            await saveTaskToFirebase(title, description, deadline);
            document.getElementById("taskForm").reset();
        });

        // Load tasks when the page loads
        loadTasksFromFirebase();
    </script>

    <script>
        // Service Worker Registration
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', async () => {
                try {
                    const registration = await navigator.serviceWorker.register('/serviceWorker.js');
                    console.log('Service Worker registered:', registration);
                    navigator.serviceWorker.ready.then((reg) => {
                        console.log("Service Worker Ready:", reg);
                    });
                } catch (error) {
                    console.error('Service Worker registration failed:', error);
                }
            });
        }

        // PWA Installation Handling
        let deferredPrompt;

        window.addEventListener('beforeinstallprompt', (event) => {
            event.preventDefault();
            deferredPrompt = event;

            const installButton = document.getElementById('installPwa');
            if (installButton) {
                installButton.style.display = 'block';
            }
        });

        document.getElementById('installPwa')?.addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const result = await deferredPrompt.userChoice;
                console.log(`User ${result.outcome === 'accepted' ? 'accepted' : 'dismissed'} the install prompt`);
                deferredPrompt = null;
            }
        });

        window.addEventListener('beforeinstallprompt', (event) => {
            console.log("✅ beforeinstallprompt event fired");  // Debugging log
            event.preventDefault();
            deferredPrompt = event;

            const installButton = document.getElementById('installPwa');
            if (installButton) {
                installButton.style.display = 'block';
            } else {
                console.error("❌ Install button not found in the DOM!");
            }
        });

        class TaskManager {
            constructor() {
                this.tasks = JSON.parse(localStorage.getItem('tasks')) || [];
                this.taskForm = document.getElementById('taskForm');
                this.tasksContainer = document.getElementById('tasksContainer');
                this.notificationToggle = document.getElementById('notificationToggle');
                this.soundToggle = document.getElementById('soundToggle');
                
                // Create notification sound
                this.notificationSound = new Audio('data:audio/mp3;base64,SUQzBAAAAAAAI1RTU0UAAAAPAAADTGF2ZjU4Ljc2LjEwMAAAAAAAAAAAAAAA//tQwAAAAAAAAAAAAAAAAAAAAAAASW5mbwAAAA8AAAADAAAGhgBVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVWqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqr///////////////////////////////////////////8AAAAATGF2YzU4LjEzAAAAAAAAAAAAAAAAJAAAAAAAAAAAAYZUh8XJAAAAAAD/+xDEAAPAAAGkAAAAIAAANIAAAAQAAAaQAAAAhAAA0gAAABExBTUUzLjEwMFVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVV//sQxAaD0AAAf4AAAAAAA0gAAAAAVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVV');
                
                this.init();
                this.setupNotifications();
                this.startNotificationCheck();
            }

            init() {
                // Load saved notification preferences
                this.notificationToggle.checked = localStorage.getItem('notifications') === 'true';
                this.soundToggle.checked = localStorage.getItem('sound') === 'true';

                // Event listeners
                this.taskForm.addEventListener('submit', (e) => this.handleSubmit(e));
                this.notificationToggle.addEventListener('change', () => {
                    localStorage.setItem('notifications', this.notificationToggle.checked);
                });
                this.soundToggle.addEventListener('change', () => {
                    localStorage.setItem('sound', this.soundToggle.checked);
                });

                // Initial render
                this.renderTasks();
            }

            async setupNotifications() {
                if ('Notification' in window) {
                    const permission = await Notification.requestPermission();
                    this.notificationToggle.checked = permission === 'granted';
                } else {
                    this.notificationToggle.disabled = true;
                }
            }

            startNotificationCheck() {
                // Check every minute
                setInterval(() => this.checkDeadlines(), 60000);
                this.checkDeadlines(); // Initial check
            }

            playNotificationSound() {
                if (this.soundToggle.checked) {
                    this.notificationSound.play().catch(error => {
                        console.log('Audio playback failed:', error);
                    });
                }
            }

            handleSubmit(e) {
                e.preventDefault();
                
                const title = document.getElementById('title').value;
                const description = document.getElementById('description').value;
                const deadline = document.getElementById('deadline').value;

                const task = {
                    id: Date.now(),
                    title,
                    description,
                    deadline,
                    createdAt: new Date().toISOString(),
                    notified: {
                        day: false,
                        halfDay: false,
                        sixHours: false,
                        oneHour: false
                    }
                };

                this.tasks.push(task);
                this.saveTasks();
                this.renderTasks();
                this.taskForm.reset();

                // Show success notification
                if (this.notificationToggle.checked) {
                    new Notification('Task Added', {
                        body: `"${title}" has been added to your tasks.`,
                        icon: '/favicon.ico'
                    });
                    this.playNotificationSound();
                }
            }

            checkDeadlines() {
                const now = new Date();
                this.tasks.forEach(task => {
                    const deadline = new Date(task.deadline);
                    const hoursLeft = (deadline - now) / (1000 * 60 * 60);

                    if (hoursLeft > 0) {
                        // Check notification thresholds
                        if (this.notificationToggle.checked) {
                            if (hoursLeft <= 1 && !task.notified.oneHour) {
                                this.sendNotification(task, '1 hour');
                                task.notified.oneHour = true;
                            } else if (hoursLeft <= 6 && !task.notified.sixHours) {
                                this.sendNotification(task, '6 hours');
                                task.notified.sixHours = true;
                            } else if (hoursLeft <= 12 && !task.notified.halfDay) {
                                this.sendNotification(task, '12 hours');
                                task.notified.halfDay = true;
                            } else if (hoursLeft <= 24 && !task.notified.day) {
                                this.sendNotification(task, '24 hours');
                                task.notified.day = true;
                            }
                        }
                    }
                });
                
                this.saveTasks();
                this.renderTasks();
            }

            sendNotification(task, timeLeft) {
                if (Notification.permission === 'granted') {
                    new Notification(`Task Due in ${timeLeft}!`, {
                        body: `"${task.title}" needs to be completed within ${timeLeft}.`,
                        icon: '/favicon.ico'
                    });
                    this.playNotificationSound();
                }
            }

            deleteTask(id) {
                const taskCard = document.querySelector(`[data-id="${id}"]`);
                taskCard.style.transform = 'translateX(100px)';
                taskCard.style.opacity = '0';

                setTimeout(() => {
                    this.tasks = this.tasks.filter(task => task.id !== id);
                    this.saveTasks();
                    this.renderTasks();
                }, 300);
            }

            saveTasks() {
                    localStorage.setItem('tasks', JSON.stringify(this.tasks));
            }

            formatDate(dateString) {
                return new Date(dateString).toLocaleString();
            }

            renderTasks() {
                this.tasksContainer.innerHTML = this.tasks
                    .sort((a, b) => new Date(a.deadline) - new Date(b.deadline))
                    .map(task => `
                        <div class="task-card" data-id="${task.id}" style="opacity: 0; transform: translateY(20px);">
                            <h3>${task.title}</h3>
                            <p>${task.description}</p>
                            <p class="deadline">Deadline: ${this.formatDate(task.deadline)}</p>
                            <button class="delete-btn" onclick="taskManager.deleteTask(${task.id})">×</button>
                        </div>
                    `)
                    .join('');

                // Animate cards on load
                setTimeout(() => {
                    document.querySelectorAll('.task-card').forEach(card => {
                        card.style.opacity = '1';
                        card.style.transform = 'translateY(0)';
                    });
                }, 100);
            }
        }

        const taskManager = new TaskManager();
    </script>
</body>
</html>
